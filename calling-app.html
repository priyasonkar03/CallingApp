<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"/>
<meta name="theme-color" content="#15171b"/>
<title>Call Desk</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --gun0:#121419; --gun1:#1d212a; --gun2:#2a2f3a; --gun3:#363c49;
  --ink:#1b2029; --mut:#5c636f; --line:#a7afbd;
  --brass:#cda74e; --brass-hi:#f3d785; --brass-dk:#8a6c28;
  --green:#2f9061; --red:#c33b2c; --slate:#5c636f;
  --disp:'Space Grotesk',system-ui,sans-serif; --mono:'Space Mono',ui-monospace,monospace; --ui:'Inter',system-ui,sans-serif;
  --plate:linear-gradient(150deg,#f7f9fc 0%,#e1e6ee 36%,#cbd2dd 52%,#e8ecf2 100%);
  --plate-edge:inset 0 1px 0 #ffffff, inset 0 0 0 1px rgba(255,255,255,.3), inset 0 -3px 7px rgba(0,0,0,.13), 0 10px 24px -12px rgba(0,0,0,.7);
  --dark-brushed:linear-gradient(180deg,#39404c 0%,#262b34 58%,#1a1d24 100%);
  --brush: repeating-linear-gradient(0deg, rgba(255,255,255,.035) 0 1px, rgba(0,0,0,.02) 1px 2px);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;background:#0d0f12;color:var(--ink);font-family:var(--ui)}
#app{max-width:480px;margin:0 auto;height:100dvh;display:flex;flex-direction:column;position:relative;overflow:hidden;
  background:radial-gradient(120% 70% at 50% -10%, #272c36 0%, #181b21 55%, #101216 100%)}
svg{display:block}

/* ---- header: dark brushed steel ---- */
header{position:relative;background:var(--dark-brushed);color:#eef1f6;padding:15px 18px 16px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.14), 0 4px 14px rgba(0,0,0,.5);border-bottom:1px solid #0c0e12}
header::after{content:'';position:absolute;inset:0;background:var(--brush);pointer-events:none;opacity:.7}
.htop{display:flex;justify-content:space-between;align-items:center;position:relative}
.agent{display:flex;align-items:center;gap:11px}
.agbadge{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(180deg,#454c59,#22272f);box-shadow:inset 0 1px 0 rgba(255,255,255,.25),inset 0 -2px 4px rgba(0,0,0,.5),0 2px 5px rgba(0,0,0,.4);
  color:var(--brass-hi)}
.agent b{font-family:var(--disp);font-weight:700;font-size:16px;letter-spacing:.2px;display:block}
.agent small{font-size:10.5px;color:#97a1b4;letter-spacing:.1em;text-transform:uppercase}
.tally{text-align:right}
.tally b{font-family:var(--disp);font-weight:700;font-size:32px;line-height:1;
  background:linear-gradient(180deg,#f5da8c,#cda74e 55%,#9d7a30);-webkit-background-clip:text;background-clip:text;color:transparent;
  text-shadow:0 1px 0 rgba(0,0,0,.3)}
.tally span{display:block;font-size:9.5px;color:#97a1b4;letter-spacing:.16em;text-transform:uppercase;margin-top:3px}
.rail{position:relative;margin-top:13px;height:9px;border-radius:8px;background:linear-gradient(180deg,#0f1217,#1c212a);
  box-shadow:inset 0 1px 2px rgba(0,0,0,.7), inset 0 -1px 0 rgba(255,255,255,.05);overflow:hidden}
.rail i{display:block;height:100%;border-radius:8px;background:linear-gradient(180deg,#f3d785,#cda74e 60%,#a07c30);
  box-shadow:0 0 8px rgba(205,167,78,.5);transition:width .45s ease}
.railnum{display:flex;justify-content:space-between;font-family:var(--mono);font-size:10px;color:#8b94a6;margin-top:6px}

.body{flex:1;overflow-y:auto;padding:18px 16px 96px}
.view{display:none}.view.on{display:block}

/* ---- record card: polished steel plate ---- */
.stage{position:relative;min-height:340px}
.rec{position:relative;background:var(--plate);border:1px solid var(--line);border-radius:18px;
  padding:24px 20px 18px;box-shadow:var(--plate-edge);overflow:hidden}
.rec::after{content:'';position:absolute;inset:0;background:var(--brush);pointer-events:none;opacity:.5;border-radius:18px}
.rectag{position:absolute;top:14px;left:18px;font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:#7c8492;display:flex;align-items:center;gap:5px}
.recno{position:absolute;top:13px;right:18px;font-family:var(--mono);font-size:11px;color:var(--brass-dk);font-weight:700}
.token{width:64px;height:64px;border-radius:15px;margin:24px auto 12px;display:flex;align-items:center;justify-content:center;
  font-family:var(--disp);font-weight:700;font-size:27px;color:var(--brass-hi);
  background:linear-gradient(180deg,#3b414e,#20252e);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.22),inset 0 -3px 6px rgba(0,0,0,.55),0 4px 9px rgba(0,0,0,.35)}
.cname{font-family:var(--disp);font-weight:700;font-size:25px;text-align:center;line-height:1.1;color:#171c24;position:relative}
.cnum{font-family:var(--mono);font-weight:700;font-size:18px;text-align:center;color:#222730;margin:8px 0 2px;letter-spacing:.5px;position:relative}
.cloc{text-align:center;font-size:12px;color:#5c636f;letter-spacing:.04em;position:relative}

.call{position:relative;display:flex;align-items:center;justify-content:center;gap:9px;width:100%;margin-top:18px;
  border:1px solid #1f5e3e;border-radius:14px;padding:15px;font-family:var(--disp);font-weight:700;font-size:17px;
  text-decoration:none;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.4);letter-spacing:.02em;
  background:linear-gradient(180deg,#46b07c,#2f9061 52%,#236e49);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),inset 0 -3px 5px rgba(0,0,0,.28),0 5px 12px rgba(0,0,0,.4)}
.call:active{transform:translateY(1px);box-shadow:inset 0 2px 5px rgba(0,0,0,.4)}

/* stamp imprint */
.stamp{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;z-index:4}
.stamp span{font-family:var(--disp);font-weight:700;font-size:30px;letter-spacing:.06em;text-transform:uppercase;
  border:4px solid currentColor;border-radius:10px;padding:8px 16px;transform:rotate(-11deg);opacity:.9;
  box-shadow:0 2px 5px rgba(0,0,0,.15)}
.rec.fire .stamp{animation:stampin .34s cubic-bezier(.2,.9,.3,1.3) forwards}
.rec.leave{animation:slideout .32s ease forwards}
.rec.enter{animation:slidein .34s ease}
@keyframes stampin{0%{opacity:0;transform:scale(1.6)}60%{opacity:1;transform:scale(.96)}100%{opacity:1;transform:scale(1)}}
@keyframes slideout{to{transform:translateX(-115%) rotate(-3deg);opacity:0}}
@keyframes slidein{from{transform:translateX(40%);opacity:0}}

/* outcome stamp pad: small steel keys */
.padlbl{font-family:var(--ui);font-size:11px;font-weight:600;color:#9aa3b3;letter-spacing:.12em;text-transform:uppercase;
  margin:22px 4px 11px;display:flex;justify-content:space-between}
.pad{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.oc{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:14px;padding:14px 13px;
  font-family:var(--disp);font-weight:500;font-size:15px;color:#1d222b;cursor:pointer;text-align:left;
  background:var(--plate);box-shadow:var(--plate-edge)}
.oc:active{transform:translateY(1px);box-shadow:inset 0 2px 5px rgba(0,0,0,.25)}
.oc .ico{width:34px;height:34px;border-radius:9px;flex:none;display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.4),inset 0 -2px 4px rgba(0,0,0,.3),0 2px 4px rgba(0,0,0,.25)}
.i-green{background:linear-gradient(180deg,#46b07c,#268254)} .i-red{background:linear-gradient(180deg,#d6584a,#a82f22)}
.i-brass{background:linear-gradient(180deg,#f0cd78,#b78c34)} .i-slate{background:linear-gradient(180deg,#737c8b,#4a515d)}

.note{width:100%;margin-top:13px;padding:13px;border:1px solid var(--line);border-radius:12px;font-family:var(--ui);font-size:14px;
  background:linear-gradient(180deg,#eef1f6,#dde2ea);box-shadow:inset 0 2px 4px rgba(0,0,0,.12)}
.skip{width:100%;margin-top:10px;border:1px solid #99a2b0;color:#5c636f;border-radius:12px;padding:13px;
  font-family:var(--disp);font-weight:500;font-size:14px;display:flex;align-items:center;justify-content:center;gap:8px;
  background:linear-gradient(180deg,#e7ebf1,#d3d9e2);box-shadow:inset 0 1px 0 #fff,0 2px 5px rgba(0,0,0,.18)}
:focus-visible{outline:3px solid var(--brass);outline-offset:2px}

/* lists / callers / setup rows */
.sechead{font-family:var(--disp);font-weight:700;font-size:18px;margin:2px 0 14px;color:#eef1f6;display:flex;align-items:center;gap:9px}
.sechead .si{color:var(--brass-hi)}
.row{display:flex;justify-content:space-between;align-items:center;border:1px solid var(--line);border-radius:14px;
  padding:14px;margin-bottom:11px;background:var(--plate);box-shadow:var(--plate-edge)}
.row b{font-family:var(--disp);font-size:16px;color:#1c212a}
.row .meta{font-family:var(--mono);font-size:11px;color:#5c636f;margin-top:3px}
.chip{font-family:var(--ui);font-size:11px;font-weight:600;padding:5px 11px;border-radius:20px;color:#1c212a;
  background:linear-gradient(180deg,#e9edf3,#d2d8e1);box-shadow:inset 0 1px 0 #fff,0 1px 2px rgba(0,0,0,.2);display:inline-flex;align-items:center;gap:6px}
.dot{width:8px;height:8px;border-radius:50%;box-shadow:0 0 4px currentColor}
.bar{height:9px;background:linear-gradient(180deg,#9aa1ad,#c2c8d2);border-radius:8px;overflow:hidden;margin:12px 0 6px;box-shadow:inset 0 1px 3px rgba(0,0,0,.3)}
.bar i{display:block;height:100%;background:linear-gradient(180deg,#f3d785,#cda74e 60%,#a07c30);box-shadow:0 0 8px rgba(205,167,78,.5)}
.note2{font-size:12px;color:#8b94a6;text-align:center;margin-top:16px;line-height:1.5}
.done{text-align:center;padding:52px 16px;color:#aeb6c4}
.done .big{font-family:var(--disp);font-weight:700;font-size:48px;
  background:linear-gradient(180deg,#f5da8c,#cda74e);-webkit-background-clip:text;background-clip:text;color:transparent}
.done h3{color:#eef1f6;font-family:var(--disp)}

/* callback sheet */
.sheetbg{position:absolute;inset:0;background:rgba(8,10,13,.6);opacity:0;pointer-events:none;transition:.2s;z-index:30}
.sheetbg.on{opacity:1;pointer-events:auto}
.sheet{position:absolute;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;border-radius:20px 20px 0 0;
  padding:18px 18px calc(18px + env(safe-area-inset-bottom));transform:translateY(100%);
  transition:transform .26s cubic-bezier(.2,.8,.3,1);z-index:31;background:var(--dark-brushed);
  box-shadow:0 -10px 30px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.12);border-top:1px solid #0c0e12}
.sheetbg.on .sheet{transform:translateY(0)}
.sheet h4{font-family:var(--disp);font-weight:700;font-size:18px;margin:2px 0 2px;color:#eef1f6;display:flex;gap:8px;align-items:center}
.sheet h4 .si{color:var(--brass-hi)}
.sheet .sub{font-size:12px;color:#97a1b4;margin-bottom:14px}
.cbgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.cb{border:1px solid var(--line);border-radius:13px;padding:13px 11px;font-family:var(--disp);font-weight:500;font-size:14px;
  color:#1c212a;text-align:left;cursor:pointer;background:var(--plate);box-shadow:var(--plate-edge)}
.cb.sel{border:2px solid var(--brass);box-shadow:inset 0 0 0 1px var(--brass-hi),0 4px 12px rgba(205,167,78,.3)}
.cb small{display:block;font-family:var(--mono);font-size:10px;color:#5c636f;margin-top:3px;font-weight:400}
.cbcustom{display:flex;align-items:center;gap:9px;margin-bottom:16px}
.cbcustom label{font-size:12px;color:#97a1b4;white-space:nowrap}
.cbcustom input{flex:1;padding:11px;border:1px solid var(--line);border-radius:11px;font-family:var(--mono);font-size:13px;
  background:linear-gradient(180deg,#eef1f6,#dde2ea);box-shadow:inset 0 2px 4px rgba(0,0,0,.12)}
.sheetbtns{display:flex;gap:10px}
.sheetbtns button{flex:1;border-radius:13px;padding:15px;font-family:var(--disp);font-weight:700;font-size:15px;cursor:pointer;border:1px solid}
.b-go{color:#3a2e0e;border-color:#7a5f24;background:linear-gradient(180deg,#f3d785,#cda74e 55%,#9c7a30);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 4px 10px rgba(0,0,0,.4)}
.b-cancel{color:#aeb6c4;border-color:#3a414d;background:linear-gradient(180deg,#333944,#23272f)}

/* toast */
.toast{position:absolute;left:50%;bottom:108px;transform:translateX(-50%) translateY(16px);
  background:linear-gradient(180deg,#333944,#1d212a);color:#eef1f6;font-family:var(--disp);font-weight:500;
  padding:11px 20px;border-radius:30px;font-size:14px;opacity:0;transition:.22s;pointer-events:none;z-index:40;
  border:1px solid #0c0e12;box-shadow:inset 0 1px 0 rgba(255,255,255,.15),0 6px 18px rgba(0,0,0,.5);display:flex;align-items:center;gap:8px}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* bottom nav: brushed steel bar */
nav{position:absolute;bottom:0;left:0;right:0;max-width:480px;margin:0 auto;height:68px;display:flex;
  background:var(--dark-brushed);border-top:1px solid #0c0e12;box-shadow:0 -4px 14px rgba(0,0,0,.5)}
nav::before{content:'';position:absolute;inset:0;background:var(--brush);opacity:.6;pointer-events:none}
nav button{flex:1;background:none;border:none;color:#8b94a6;font-family:var(--ui);font-size:10px;font-weight:600;
  letter-spacing:.04em;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;position:relative}
nav button.on{color:var(--brass-hi)}
nav button.on::after{content:'';position:absolute;top:7px;width:22px;height:3px;border-radius:3px;
  background:linear-gradient(90deg,#f3d785,#cda74e);box-shadow:0 0 8px rgba(205,167,78,.6)}

/* login overlay */
.loginbg{position:absolute;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;padding:24px;
  background:radial-gradient(120% 70% at 50% -10%, #272c36 0%, #181b21 55%, #101216 100%);opacity:0;pointer-events:none;transition:.2s}
.loginbg.on{opacity:1;pointer-events:auto}
.loginpanel{width:100%;max-width:360px;background:var(--plate);border:1px solid var(--line);border-radius:18px;box-shadow:var(--plate-edge);padding:24px;position:relative}
.loginpanel::after{content:'';position:absolute;inset:0;background:var(--brush);opacity:.5;border-radius:18px;pointer-events:none}
.lbrand{display:flex;align-items:center;gap:9px;color:var(--brass-dk);font-family:var(--disp);font-weight:700;letter-spacing:.08em;font-size:13px;margin-bottom:14px;position:relative}
.loginpanel h2{font-family:var(--disp);margin:0 0 4px;color:#1c212a;font-size:24px;position:relative}
.loginpanel p{margin:0 0 18px;font-size:12px;color:#5c636f;position:relative}
.lf{position:relative;width:100%;padding:13px;margin-bottom:11px;border:1px solid var(--line);border-radius:12px;font-family:var(--ui);
  font-size:14px;background:linear-gradient(180deg,#eef1f6,#dde2ea);box-shadow:inset 0 2px 4px rgba(0,0,0,.12)}
.lbtn{position:relative;width:100%;border:1px solid #1f5e3e;border-radius:13px;padding:15px;font-family:var(--disp);font-weight:700;
  font-size:16px;color:#fff;text-shadow:0 1px 1px rgba(0,0,0,.4);cursor:pointer;
  background:linear-gradient(180deg,#46b07c,#2f9061 52%,#236e49);box-shadow:inset 0 1px 0 rgba(255,255,255,.5),0 5px 12px rgba(0,0,0,.4)}
.lbtn:disabled{filter:grayscale(.5) opacity(.7)}
.lerr{position:relative;color:var(--red);font-size:12.5px;margin-bottom:10px;min-height:16px;font-family:var(--ui)}

@media (prefers-reduced-motion: reduce){
  .rec.fire .stamp,.rec.leave,.rec.enter{animation:none!important}.rail i,.toast{transition:none}
  .rec.fire .stamp{opacity:1}
}
</style>
</head>
<body>
<div id="app">
  <header>
    <div class="htop">
      <div class="agent"><div class="agbadge" id="agbadge"></div><div><b id="agentn">Arti</b><small>On the desk · Jabalpur</small></div></div>
      <div class="tally"><b id="st-done">0</b><span>Calls today</span></div>
    </div>
    <div class="rail"><i id="rail" style="width:0%"></i></div>
    <div class="railnum"><span id="rl-reach">0 reached</span><span id="rl-left">0 left in list</span></div>
  </header>

  <div class="body">
    <section class="view on" id="v-call"><div class="stage" id="stage"></div></section>
    <section class="view" id="v-callers"><div class="sechead"><span class="si" id="h-callers"></span>Callers — today</div><div id="callerlist"></div></section>
    <section class="view" id="v-lists"><div class="sechead"><span class="si" id="h-lists"></span>Lists</div><div id="listwrap"></div></section>
    <section class="view" id="v-set">
      <div id="acct"></div>
      <div class="sechead"><span class="si" id="h-set"></span>Outcomes</div>
      <div id="ocset"></div>
      <div class="row"><span>Stamp &amp; jump to next number</span><b style="color:var(--green);font-family:var(--disp)">On</b></div>
      <div class="row"><span>Note field on the card</span><b style="color:var(--green);font-family:var(--disp)">On</b></div>
      <button class="skip" style="border-color:var(--red);color:var(--red);margin-top:14px" onclick="resetAll()">Reset today's progress</button>
      <div class="note2">Prototype — sample of 1000 live numbers from JABALPUR_CLEAN.xlsx.<br>Outcomes save on this device.</div>
    </section>
  </div>

  <div class="sheetbg" id="cbbg">
    <div class="sheet" role="dialog" aria-label="Schedule call back">
      <h4><span class="si" id="h-cb"></span>Schedule call back</h4>
      <div class="sub" id="cbwho">When should we ring back?</div>
      <div class="cbgrid" id="cbgrid"></div>
      <div class="cbcustom"><label for="cbinput">Custom</label><input type="datetime-local" id="cbinput"/></div>
      <div class="sheetbtns"><button class="b-cancel" onclick="closeCallback()">Cancel</button><button class="b-go" onclick="confirmCallback()">Set call back</button></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <nav>
    <button class="on" data-v="call" data-ic="phone" data-lbl="Desk"></button>
    <button data-v="callers" data-ic="users" data-lbl="Callers"></button>
    <button data-v="lists" data-ic="folder" data-lbl="Lists"></button>
    <button data-v="set" data-ic="settings" data-lbl="Setup"></button>
  </nav>

    <div class="pad">${pad}</div>
    <input class="note" id="note" placeholder="Note (optional)…"/>
    <button class="skip" onclick="log('skip',true)">${svg('skip',16)} Skip this number</button>
  </div>`;
}
function doneHTML(){const n=MODE==='live'?liveDone:state.log.length;
  return `<div class="done"><div class="big">${n}</div><h3>List cleared</h3><p>Every number logged. Strong work.</p></div>`;}
function renderCall(anim){
  stats();const st=document.getElementById('stage');
  const c = MODE==='live' ? current : CONTACTS[state.idx];
  const ended = MODE==='live' ? (current===null) : (state.idx>=CONTACTS.length);
  if(ended){ st.innerHTML=doneHTML(); return; }
  const idText = MODE==='live' ? ('#'+c.id) : ('#'+String(state.idx+1).padStart(4,'0'));
  st.innerHTML=cardHTML(c,idText);
  if(anim&&!reduce)document.getElementById('rec').classList.add('enter');
}
async function nextNumber(){
  if(MODE!=='live'){ renderCall(true); return; }
  document.getElementById('stage').innerHTML='<div class="done"><p>Loading next number…</p></div>';
  const {data,error}=await sb.rpc('get_next_contact',{p_campaign:CAMPAIGN});
  if(error){ toast('Load failed','x'); console.error(error); current=null; renderCall(false); return; }
  current = data ? {id:data.id, n:data.name, m:data.mobile, d:data.district} : null;
  renderCall(true);
}

function roundTo(d){d.setMinutes(0,0,0);return d;}
function cbPresets(){const now=new Date(),mk=(h,a)=>{const d=new Date(now);d.setDate(d.getDate()+a);d.setHours(h,0,0,0);return d;};
  return [{t:'Later today',d:roundTo(new Date(now.getTime()+3*3600*1000))},{t:'Tomorrow AM',d:mk(10,1)},
          {t:'Tomorrow PM',d:mk(16,1)},{t:'In 2 days',d:mk(11,2)}];}
let cbChoice=null;
const fmtCB=d=>d.toLocaleString([], {weekday:'short',day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});
function toLocalInput(d){const p=n=>String(n).padStart(2,'0');return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+'T'+p(d.getHours())+':'+p(d.getMinutes());}
function askCallback(){const c=CONTACTS[state.idx];
  document.getElementById('cbwho').textContent='Ring back '+c.n+' — pick a time';
  const pres=cbPresets();cbChoice=pres[1].d;window._cbpres=pres;
  let h='';pres.forEach((p,i)=>{h+=`<button class="cb ${i===1?'sel':''}" data-i="${i}" onclick="pickCB(${i})">${p.t}<small>${fmtCB(p.d)}</small></button>`;});
  document.getElementById('cbgrid').innerHTML=h;document.getElementById('cbinput').value=toLocalInput(pres[1].d);
  document.getElementById('cbbg').classList.add('on');}
function pickCB(i){cbChoice=window._cbpres[i].d;document.getElementById('cbinput').value=toLocalInput(cbChoice);
  document.querySelectorAll('.cb').forEach(b=>b.classList.toggle('sel',+b.dataset.i===i));}
function closeCallback(){document.getElementById('cbbg').classList.remove('on');}
function confirmCallback(){const v=document.getElementById('cbinput').value;const when=v?new Date(v):cbChoice;closeCallback();log('callback',false,when.toISOString());}

async function log(k,skip,cb){
  const o=OUTCOMES.find(x=>x.k===k);
  const c = MODE==='live' ? current : CONTACTS[state.idx];
  if(!c) return;
  const note=(document.getElementById('note')||{}).value||'';
  if(MODE==='live'){
    const {error}=await sb.rpc('log_outcome',{p_contact:c.id,p_outcome:(skip?'skip':k),p_note:note,p_callback:cb||null});
    if(error){ toast('Save failed','x'); console.error(error); return; }
    if(!skip){ liveDone++; if(o&&o.conn) liveReach++; livePending=Math.max(0,livePending-1); }
  } else {
    state.log.push({m:c.m,k,conn:o?o.conn:false,note,cb:cb||null}); state.idx++; save();
  }
  toast(skip?'Skipped':(k==='callback'&&cb?('Call back '+fmtCB(new Date(cb))):o.t),skip?'skip':(o?o.ic:'check'));
  const rec=document.getElementById('rec');
  const advance=()=>{ if(MODE==='live') nextNumber(); else { renderCall(true); stats(); } };
  if(reduce||!rec){ advance(); return; }
  if(!skip){const s=document.getElementById('stamp');s.style.color=o.color;document.getElementById('stampt').textContent=o.stamp;rec.classList.add('fire');}
  setTimeout(()=>{rec.classList.add('leave');setTimeout(advance,300);},skip?0:360);
}
function toast(t,ic){const el=document.getElementById('toast');el.innerHTML=svg(ic||'check',16)+'<span>'+t+'</span>';
  el.classList.add('show');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('show'),1150);}

const STMAP={oncall:['On call','#46b07c'],online:['Online','#46b07c'],idle:['Idle','#e3b24f'],offline:['Offline','#7c8492']};
async function renderCallers(){
  if(MODE==='live'){
    const {data}=await sb.from('profiles').select('full_name,state,role').order('full_name');
    let h='';(data||[]).forEach(p=>{const s=STMAP[p.state]||STMAP.offline;
      h+=`<div class="row"><div><b>${p.full_name}${p.role==='admin'?' ·':''}</b><div class="meta">${p.role==='admin'?'admin':'agent'}</div></div>
        <span class="chip"><span class="dot" style="color:${s[1]};background:${s[1]}"></span>${s[0]}</span></div>`;});
    document.getElementById('callerlist').innerHTML=h||'<div class="note2">No agents yet — add users in Supabase.</div>'; return;
  }
  const done=state.log.length,conn=state.log.filter(x=>x.conn).length;let h='';
  CALLERS.forEach((c,i)=>{const d=i===0?done:c.d,cn=i===0?conn:c.cn;
    h+=`<div class="row"><div><b>${c.n}</b><div class="meta">${d} calls · ${cn} reached</div></div>
      <span class="chip"><span class="dot" style="color:${c.c};background:${c.c}"></span>${c.s}</span></div>`;});
  document.getElementById('callerlist').innerHTML=h;}
async function renderLists(){
  if(MODE==='live'){
    const t=await sb.from('contacts').select('id',{count:'exact',head:true}).eq('campaign_id',CAMPAIGN);
    const d=await sb.from('contacts').select('id',{count:'exact',head:true}).eq('campaign_id',CAMPAIGN).eq('status','done');
    const total=t.count||0,done=d.count||0,pct=total?Math.round(done/total*100):0;
    document.getElementById('listwrap').innerHTML=`<div class="row" style="display:block"><b>Jabalpur · Clean</b>
      <div class="meta">${total.toLocaleString()} numbers</div><div class="bar"><i style="width:${pct}%"></i></div>
      <div class="meta">${done.toLocaleString()} done · ${(total-done).toLocaleString()} pending · ${pct}%</div></div>`;return;}
  const done=state.idx,total=CONTACTS.length,pct=Math.round(done/total*100);
  document.getElementById('listwrap').innerHTML=`
   <div class="row" style="display:block"><b>Jabalpur · Clean</b><div class="meta">${total.toLocaleString()} numbers · 6 agents</div>
     <div class="bar"><i style="width:${pct}%"></i></div><div class="meta">${done} done · ${total-done} pending · ${pct}%</div></div>
   <div class="row"><div><b>Reattempts</b><div class="meta">652 invalid numbers</div></div>
     <span class="chip"><span class="dot" style="color:#7c8492;background:#7c8492"></span>Paused</span></div>`;}
function renderSet(){
  const acct=document.getElementById('acct');
  if(MODE==='live'){
    acct.innerHTML=`<div class="row"><div><b>Connected</b><div class="meta" id="acctmail">live · Supabase</div></div>
      <button class="chip" onclick="doLogout()">Sign out</button></div>`;
    if(sb) sb.auth.getUser().then(({data})=>{const e=document.getElementById('acctmail');if(e&&data&&data.user)e.textContent=data.user.email;});
  } else {
    acct.innerHTML=`<div class="row"><div><b>Demo mode</b><div class="meta">${sb?'not signed in':'offline — no connection'}</div></div></div>`;
  }
  let h='';OUTCOMES.forEach(o=>{h+=`<div class="row"><div style="display:flex;align-items:center;gap:11px">
  <span class="ico ${o.col}" style="width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,.4),inset 0 -2px 4px rgba(0,0,0,.3)">${svg(o.ic,17)}</span>
  <b>${o.t}</b></div><span class="chip">${o.conn?'reached':'no contact'}</span></div>`;});
  document.getElementById('ocset').innerHTML=h;}
function resetAll(){if(confirm("Reset today's progress?")){state={idx:0,log:[]};save();renderCall(false);renderLists();renderCallers();toast('Reset','rotate');}}

document.querySelectorAll('nav button').forEach(b=>{
  b.innerHTML=svg(b.dataset.ic,19)+'<span>'+b.dataset.lbl+'</span>';
  b.onclick=()=>{const v=b.dataset.v;
    document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('on',x===b));
    document.querySelectorAll('.view').forEach(s=>s.classList.remove('on'));
    document.getElementById('v-'+v).classList.add('on');
    if(v==='callers')renderCallers();if(v==='lists')renderLists();if(v==='set')renderSet();};
});
document.getElementById('agbadge').innerHTML=svg('user',20);
document.getElementById('h-callers').innerHTML=svg('users',18);
document.getElementById('h-lists').innerHTML=svg('folder',18);
document.getElementById('h-set').innerHTML=svg('settings',18);
document.getElementById('h-cb').innerHTML=svg('clock',18);

/* ---------- live boot ---------- */
async function doLogout(){if(sb)await sb.auth.signOut();location.reload();}
async function goLive(){
  MODE='live';
  try{
    const {data:{user}}=await sb.auth.getUser();
    const {data:prof}=await sb.from('profiles').select('full_name').eq('id',user.id).single();
    if(prof&&prof.full_name)document.getElementById('agentn').textContent=prof.full_name;
    const t=await sb.from('contacts').select('id',{count:'exact',head:true}).eq('campaign_id',CAMPAIGN);
    const p=await sb.from('contacts').select('id',{count:'exact',head:true}).eq('campaign_id',CAMPAIGN).neq('status','done');
    liveTotal=t.count||0;livePending=p.count||0;
    const today=await sb.rpc('my_today');
    if(today.data&&today.data[0]){liveDone=today.data[0].calls||0;liveReach=today.data[0].reached||0;}
  }catch(e){console.error(e);}
  await nextNumber();stats();
}
async function boot(){
  if(!sb){MODE='demo';renderCall(false);return;}
  const {data:{session}}=await sb.auth.getSession();
  if(session){await goLive();}else{MODE='demo';renderCall(false);}
}
boot();
</script>
